url: https://PM-Cardoso.github.io/cateval/

template:
  bootstrap: 5
  bootswatch: flatly
  search: true
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  bslib:
    primary: "#1d4ed8"
    secondary: "#64748b"
    success: "#16a34a"
    info: "#0891b2"
    base_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
    headings-font-weight: 700
    border-radius: "0.5rem"
    btn-border-radius: "0.375rem"
    navbar-bg: "#0f172a"
    navbar-light-color: "rgba(255,255,255,0.85)"
    navbar-light-hover-color: "#ffffff"
    navbar-light-active-color: "#ffffff"
    navbar-light-brand-color: "#ffffff"
    navbar-light-brand-hover-color: "#93c5fd"

repo:
  url:
    home: https://github.com/PM-Cardoso/cateval
    source: https://github.com/PM-Cardoso/cateval/blob/main/
    issue: https://github.com/PM-Cardoso/cateval/issues/

home:
  title: "cateval — Validating Predicted Treatment Benefit"
  description: >
    Tools for validating the calibration of predicted treatment benefit from
    treatment-selection models with a continuous outcome: overall-benefit
    calibration from matched concordant vs discordant patients, and pairwise
    drug-class effects.
  links:
    - text: "GitHub repository"
      href: https://github.com/PM-Cardoso/cateval
    - text: "Report a bug"
      href: https://github.com/PM-Cardoso/cateval/issues

footer:
  structure:
    left: developed_by
    right: built_with

navbar:
  structure:
    left:  [reference, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/PM-Cardoso/cateval
      aria-label: GitHub

reference:
  - title: "Overall-benefit calibration"
    desc: >
      Match concordant and discordant patients, then summarise how well the
      predicted benefit of following the model matches the observed benefit.
    contents:
      - match_benefit_pairs
      - benefit_deciles
      - benefit_by_drug
      - benefit_overall
      - benefit_calibration
  - title: "Pairwise drug-class calibration"
    desc: >
      Compare predicted and observed treatment effects between pairs of drugs.
    contents:
      - unified_validation
      - calibration_hte
  - title: "Predicted-best drug utilities"
    desc: >
      Identify the recommended drug (or the set of near-best drugs) for each
      patient and visualise the resulting recommendations.
    contents:
      - get_best_drugs
      - get_ranked_or_tolerant_drugs
      - optimal_drug_comparison_plot
